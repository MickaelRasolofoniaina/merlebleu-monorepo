<div class="flex justify-between items-center mb-4">
  <h2 class="text-2xl font-bold">Articles d'inventaire</h2>
</div>
<div class="flex justify-between items-center mb-4">
  <input
    type="text"
    pInputText
    placeholder="Rechercher par nom..."
    (input)="onSearchChange($event.target.value)"
    class="w-64"
  />
  <p-button label="Ajouter" icon="pi pi-plus" (onClick)="openAddModal()" />
</div>

<p-table
  [value]="items()"
  [loading]="isLoading()"
  [tableStyle]="{ 'min-width': '50rem' }"
  [stripedRows]="true"
  [paginator]="true"
  [rows]="rows"
  [totalRecords]="totalRecords()"
  [first]="first()"
  (onPage)="onTablePage($event)"
>
  <ng-template #header>
    <tr>
      <th>Nom</th>
      <th>Prix Unitaire</th>
      <th>Type</th>
      <th>Jours de Rétention</th>
      <th style="width: 12rem">Actions</th>
    </tr>
  </ng-template>
  <ng-template #body let-item>
    <tr>
      <td>{{ item.label }}</td>
      <td>{{ item.unitPrice | number: '1.2-2' }} €</td>
      <td>{{ item.type }}</td>
      <td>{{ item.maxRetentionDays }}</td>
      <td>
        <p-button
          icon="pi pi-pencil"
          [rounded]="true"
          [outlined]="true"
          severity="warn"
          class="mr-2"
          (onClick)="openEditModal(item)"
        />
        <p-button
          icon="pi pi-trash"
          [rounded]="true"
          [outlined]="true"
          severity="danger"
          (onClick)="openDeleteModal(item)"
        />
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- Add/Edit Modal -->
<p-dialog
  [visible]="showModal || showEditModal"
  [modal]="true"
  [style]="{ width: '450px' }"
  [header]="selectedItem ? 'Editer un article' : 'Ajouter un article'"
>
  <mb-item-form
    [itemData]="selectedItem"
    (itemSubmit)="selectedItem ? editItem(selectedItem.id, $event) : addItem($event)"
  ></mb-item-form>
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Annuler" severity="danger" (onClick)="closeModal()" />
      <p-button
        label="{{ selectedItem ? 'Enregistrer' : 'Ajouter' }}"
        (onClick)="selectedItem ? editItem(selectedItem.id, selectedItem) : addItem(selectedItem)"
      />
    </div>
  </ng-template>
</p-dialog>

<!-- Delete Confirmation Modal -->
<p-dialog
  [(visible)]="showDeleteModal"
  [modal]="true"
  [style]="{ width: '450px' }"
  header="Confirmer la suppression"
>
  <div class="flex flex-col gap-4">
    <p>
      Confirmer la suppression de l'article <strong>{{ selectedItem?.label }}</strong> ?
    </p>
  </div>
  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Annuler" severity="secondary" (onClick)="closeModal()" />
      <p-button label="Supprimer" severity="danger" (onClick)="deleteItem(selectedItem?.id)" />
    </div>
  </ng-template>
</p-dialog>
